name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: Branch to validate as release candidate
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_branch }}
          fetch-depth: 0

      - name: Run release preflight
        env:
          RELEASE_BRANCH: ${{ inputs.release_branch }}
          DEVEL_BRANCH: devel
        shell: bash
        run: python .github/scripts/release_preflight.py
